openapi: 3.0.3
info:
  title: E-commerce Eurostar REST API
  description: |
    REST API for an e-commerce platform with JWT authentication and checkout.

    ## Checkout rules
    - Only authenticated users can perform checkout.
    - Payment methods: `cash` or `credit_card` only.
    - Paying with `cash` applies a **10% discount** on the order subtotal.

    ## Seed data
    - **Users** (password for all: `password123`): alice@example.com, bob@example.com, carol@example.com
    - **Products**: IDs 1–3 (Eurostar Standard Ticket, Eurostar Plus Ticket, Travel Insurance)
  version: 1.0.0
  contact:
    name: E-commerce Eurostar

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Health
    description: Server health monitoring
  - name: Auth
    description: User registration and authentication
  - name: Checkout
    description: Authenticated checkout operations

paths:
  /healthcheck:
    get:
      tags:
        - Health
      summary: Healthcheck
      description: Returns the current health status of the API.
      operationId: healthcheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                timestamp: '2026-06-15T12:00:00.000Z'

  /register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Creates a new user account and returns a JWT token.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: newuser@example.com
              password: mypassword
              name: New User
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                user:
                  id: 4
                  email: newuser@example.com
                  name: New User
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Missing or invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Email, password, and name are required
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Email already registered

  /login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticates a user and returns a JWT token.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: alice@example.com
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                user:
                  id: 1
                  email: alice@example.com
                  name: Alice Johnson
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Email and password are required
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid email or password

  /checkout:
    post:
      tags:
        - Checkout
      summary: Checkout
      description: |
        Completes a purchase for the authenticated user.

        - Accepts only `cash` or `credit_card` as payment method.
        - `cash` payments receive a 10% discount on the subtotal.
      operationId: checkout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
            examples:
              cash:
                summary: Cash payment (10% discount)
                value:
                  productIds: [1, 3]
                  paymentMethod: cash
              creditCard:
                summary: Credit card payment (no discount)
                value:
                  productIds: [2]
                  paymentMethod: credit_card
      responses:
        '200':
          description: Checkout completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
              examples:
                cash:
                  summary: Cash payment with discount
                  value:
                    items:
                      - id: 1
                        name: Eurostar Standard Ticket
                        description: One-way standard class ticket on Eurostar
                        price: 89
                      - id: 3
                        name: Travel Insurance
                        description: Comprehensive travel insurance for your journey
                        price: 25
                    paymentMethod: cash
                    subtotal: 114
                    discount: 11.4
                    total: 102.6
                creditCard:
                  summary: Credit card payment
                  value:
                    items:
                      - id: 2
                        name: Eurostar Plus Ticket
                        description: One-way plus class ticket with extra legroom
                        price: 149
                    paymentMethod: credit_card
                    subtotal: 149
                    discount: 0
                    total: 149
        '400':
          description: Invalid request body or payment method
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingProducts:
                  value:
                    error: productIds must be a non-empty array
                invalidPayment:
                  value:
                    error: Payment method must be cash or credit_card
        '401':
          description: Missing, invalid, or expired JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingToken:
                  value:
                    error: Authentication required
                invalidToken:
                  value:
                    error: Invalid or expired token
        '404':
          description: One or more products not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: One or more products were not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from `/login` or `/register`

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
          example: '2026-06-15T12:00:00.000Z'

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          example: newuser@example.com
        password:
          type: string
          format: password
          minLength: 1
          example: mypassword
        name:
          type: string
          example: New User

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          example: password123

    User:
      type: object
      required:
        - id
        - email
        - name
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice Johnson

    AuthResponse:
      type: object
      required:
        - user
        - token
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT access token (expires in 1 hour)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    Product:
      type: object
      required:
        - id
        - name
        - description
        - price
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Eurostar Standard Ticket
        description:
          type: string
          example: One-way standard class ticket on Eurostar
        price:
          type: number
          format: float
          example: 89

    PaymentMethod:
      type: string
      enum:
        - cash
        - credit_card
      description: |
        - `cash`: 10% discount applied to subtotal
        - `credit_card`: no discount

    CheckoutRequest:
      type: object
      required:
        - productIds
        - paymentMethod
      properties:
        productIds:
          type: array
          minItems: 1
          items:
            type: integer
          description: List of product IDs to purchase
          example: [1, 3]
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'

    CheckoutResponse:
      type: object
      required:
        - items
        - paymentMethod
        - subtotal
        - discount
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        subtotal:
          type: number
          format: float
          description: Sum of product prices before discount
          example: 114
        discount:
          type: number
          format: float
          description: Discount amount (10% of subtotal when paying with cash)
          example: 11.4
        total:
          type: number
          format: float
          description: Final amount after discount
          example: 102.6

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Invalid email or password
